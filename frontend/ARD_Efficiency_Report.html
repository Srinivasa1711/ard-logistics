     <div class="container mt-4">
        <!-- <h1>Efficiency Report</h1> -->

            <canvas id="efficiencyChart" width="400" height="200"></canvas>
        </div>

<script>
    // Data passed from the Flask backend as JSON
   const reportData = {{ data|tojson }};


setTimeout(function(){
    window.location.reload(1);
}, 60000);

    
    // Log the data for debugging
    console.log('Report Data:', reportData);

    // Initialize the hourlyHits object for the last 12 full hours
    const hourlyHits = {};
    const now = new Date();
    now.setMinutes(0, 0, 0);  // Round down to the nearest full hour
    const last12Hours = [];

    // Generate the last 12 full hours from the current time
    for (let i = 11; i >= 0; i--) {
        const hour = new Date(now.getTime() - i * 60 * 60 * 1000);
        const formattedHour = hour.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
        last12Hours.push(formattedHour);
        hourlyHits[formattedHour] = { hit: 0 };  // Initialize hit counts for each hour
    }

    // Process the data to get hits per hour
    reportData.forEach(row => {
        const hour = row.EPHour;
        const quotaStatus = row.QuotaStatus;

        // Log the hour and quota status for debugging
        console.log('Hour:', hour, 'QuotaStatus:', quotaStatus);

        // Match the row's hour with the generated last 12 hours
        if (hourlyHits[hour]) {
            if (quotaStatus === '1') {
                hourlyHits[hour].hit += 1;  // Count the number of hits (1s)
            }
        }
    });

    // Create arrays for chart labels (hours) and data (percentages)
    const hours = Object.keys(hourlyHits);
    const percentages = hours.map(hour => {
        const hits = hourlyHits[hour].hit;
        const percentage = (hits / 36) * 100;  // Calculate percentage by dividing hits by 36
        return percentage;
    });

    // Determine the colors for each bar based on the percentage
    const barColors = percentages.map(percentage => {
        return percentage >= 60 ? 'rgba(0, 255, 0, 0.7)' : 'rgba(255, 0, 0, 0.7)';  // Matte green or matte red
    });

    // Log the processed data for debugging
    console.log('Hours:', hours);
    console.log('Percentages:', percentages);

    // Chart.js to create the bar chart
    const ctx = document.getElementById('efficiencyChart').getContext('2d');
    const efficiencyChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: last12Hours,  // X-axis: last 12 full hours
            datasets: [{
                label: 'Efficiency (%)',
                data: percentages,  // Y-axis: percentage of hits
                backgroundColor: barColors,  // Set the colors based on the percentage
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                x: {
                    ticks: {
                        font: {
                            weight: 'bold'  // Bold X-axis values
                        },
                        color: 'black'  // Set X-axis values to black
                    }
                },
                y: {
                    beginAtZero: true,
                    max: 100,  // Force y-axis to go up to 100%
                    ticks: {
                        font: {
                            weight: 'bold'  // Bold Y-axis values
                        },
                        color: 'black',  // Set Y-axis values to black
                        callback: function(value) {
                            return value + '%';  // Add percentage sign to y-axis ticks
                        }
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                },
                datalabels: {
                    color: '#000',  // Color of the data labels (Black)
                    font: {
                        weight: 'bold'  // Make data labels bold
                    },
                    anchor: 'end',
                    align: 'end',
                    formatter: function(value) {
                        return value.toFixed(1) + '%';  // Format the label as a percentage
                    }
                },
                annotation: {
                    annotations: {
                        line1: {
                            type: 'line',
                            yMin: 60,  // The value where the line starts
                            yMax: 60,  // The value where the line ends
                            borderColor: 'rgba(0, 0, 0, 1)',  // Color of the line (Black)
                            borderWidth: 2,
                            label: {
                                enabled: true,
                                content: 'Target 60%',
                                position: 'end'
                            }
                        }
                    }
                }
            }
        },
        plugins: [ChartDataLabels, 'annotation']  // Activate the datalabels and annotation plugins
    });
   document.addEventListener("DOMContentLoaded", function () {
    
    const pendingLabelsBtn = document.getElementById('pendingLabelsBtn');
    const additionalButtons = document.getElementById('additionalButtons');

    pendingLabelsBtn.addEventListener('click', function() {
        additionalButtons.classList.toggle('active'); 
    });
   });
   setInterval(() => {
            const flipper = document.getElementById("gaaFlipper");
            flipper.classList.toggle("flip");
        }, 5000);
</script>
